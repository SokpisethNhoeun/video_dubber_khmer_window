name: Windows release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        default: 1.0.0
      license_server_url:
        description: Public HTTPS fastAPI_cloud URL
        required: true

jobs:
  build:
    runs-on: windows-2022
    env:
      SIGNING_PFX: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
      SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Require production code-signing certificate
        shell: pwsh
        run: |
          if (-not $env:SIGNING_PFX -or -not $env:SIGNING_PASSWORD) {
            throw "Releases require WINDOWS_SIGNING_PFX_BASE64 and WINDOWS_SIGNING_PASSWORD secrets."
          }

      - name: Validate signing certificate
        timeout-minutes: 2
        shell: pwsh
        run: |
          $StartedAt = Get-Date
          $Pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          $Cer = Join-Path $env:RUNNER_TEMP "publisher.cer"
          [IO.File]::WriteAllBytes($Pfx, [Convert]::FromBase64String($env:SIGNING_PFX))
          $Flags = [Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
          $PfxCert = [Security.Cryptography.X509Certificates.X509Certificate2]::new(
            $Pfx,
            $env:SIGNING_PASSWORD,
            $Flags
          )
          if (-not $PfxCert.HasPrivateKey) {
            throw "WINDOWS_SIGNING_PFX_BASE64 does not contain a private key."
          }
          [IO.File]::WriteAllBytes(
            $Cer,
            $PfxCert.Export([Security.Cryptography.X509Certificates.X509ContentType]::Cert)
          )
          "SIGNING_THUMBPRINT=$($PfxCert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append
          $Elapsed = [math]::Round(((Get-Date) - $StartedAt).TotalSeconds, 2)
          Write-Host "Certificate validated and public certificate exported in $Elapsed seconds."

      - name: Install trusted FFmpeg and Inno Setup
        shell: pwsh
        run: |
          choco install ffmpeg innosetup -y --no-progress
          $Vendor = "packaging/windows/vendor/bin"
          New-Item -ItemType Directory -Force $Vendor | Out-Null
          $Ffmpeg = Get-ChildItem "C:\ProgramData\chocolatey\lib\ffmpeg\tools" -Filter ffmpeg.exe -Recurse | Select-Object -First 1
          $Ffprobe = Get-ChildItem "C:\ProgramData\chocolatey\lib\ffmpeg\tools" -Filter ffprobe.exe -Recurse | Select-Object -First 1
          if (-not $Ffmpeg -or -not $Ffprobe) { throw "Chocolatey FFmpeg binaries were not found." }
          Copy-Item $Ffmpeg.FullName "$Vendor/ffmpeg.exe" -Force
          Copy-Item $Ffprobe.FullName "$Vendor/ffprobe.exe" -Force
          $FfmpegHash = (Get-FileHash "$Vendor/ffmpeg.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          $FfprobeHash = (Get-FileHash "$Vendor/ffprobe.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          $Checksums = "$FfmpegHash  ffmpeg.exe`n$FfprobeHash  ffprobe.exe"
          [IO.File]::WriteAllText("$Vendor/SHA256SUMS.txt", $Checksums, [Text.UTF8Encoding]::new($false))

      - name: Build frozen application
        shell: pwsh
        run: |
          packaging/windows/build.ps1 `
            -LicenseServerUrl '${{ inputs.license_server_url }}' `
            -Version '${{ inputs.version }}' `
            -SkipInstaller

      - name: Sign and verify all frozen native files
        shell: pwsh
        run: |
          # Disable Authenticode revocation checks on the runner to prevent network timeouts/hangs during verification
          $TrustRegPath = "HKCU:\Software\Microsoft\Windows\CurrentVersion\WinTrust\Trust Providers\Software Publishing"
          if (Test-Path $TrustRegPath) {
            Set-ItemProperty -Path $TrustRegPath -Name State -Value 0x00023e00
          }

          $Pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          $Cer = Join-Path $env:RUNNER_TEMP "publisher.cer"
          $Signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Filter signtool.exe -Recurse | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          if (-not $Signtool) { throw "signtool.exe was not found." }
          $NativeFiles = Get-ChildItem "dist\KhmerVideoDubber" -Recurse -File | Where-Object { $_.Extension -in ".exe", ".dll", ".pyd" }
          if (-not $NativeFiles) { throw "No native files were found in the frozen application." }

          $MainExecutable = (Resolve-Path "dist\KhmerVideoDubber\KhmerVideoDubber.exe").Path
          $FilesToSign = @($NativeFiles | Where-Object {
            $_.FullName -ne $MainExecutable -and
            (Get-AuthenticodeSignature $_.FullName).Status -ne "Valid"
          })
          $AlreadySigned = $NativeFiles.Count - $FilesToSign.Count - 1
          Write-Host "Native files: $($NativeFiles.Count); already signed: $AlreadySigned; signing locally: $($FilesToSign.Count)."

          $BatchSize = 40
          for ($Offset = 0; $Offset -lt $FilesToSign.Count; $Offset += $BatchSize) {
            $End = [Math]::Min($Offset + $BatchSize - 1, $FilesToSign.Count - 1)
            $Batch = @($FilesToSign[$Offset..$End])
            $Arguments = @("sign", "/fd", "SHA256", "/f", $Pfx, "/p", $env:SIGNING_PASSWORD)
            $Arguments += @($Batch | ForEach-Object { $_.FullName })
            Write-Host "Signing native files $($Offset + 1)-$($End + 1) of $($FilesToSign.Count) without network timestamps..."
            & $Signtool @Arguments
            if ($LASTEXITCODE -ne 0) { throw "Signing failed for native-file batch starting at $($Offset + 1)." }
          }

          # Only the main executable receives a network timestamp. Timestamping every bundled
          # dependency can make the workflow take hours and lets one network request hang it.
          packaging/windows/sign-file.ps1 `
            -Signtool $Signtool -Pfx $Pfx -Password $env:SIGNING_PASSWORD `
            -FilePath $MainExecutable -TimestampUrl "http://timestamp.digicert.com" `
            -TimeoutSeconds 120
          $PublicCert = [Security.Cryptography.X509Certificates.X509Certificate2]::new($Cer)
          foreach ($StoreName in @("Root", "TrustedPublisher")) {
            $Store = [Security.Cryptography.X509Certificates.X509Store]::new(
              $StoreName,
              [Security.Cryptography.X509Certificates.StoreLocation]::LocalMachine
            )
            try {
              $Store.Open([Security.Cryptography.X509Certificates.OpenFlags]::ReadWrite)
              $Store.Add($PublicCert)
              $Imported = $Store.Certificates.Find(
                [Security.Cryptography.X509Certificates.X509FindType]::FindByThumbprint,
                $PublicCert.Thumbprint,
                $false
              )
              if ($Imported.Count -eq 0) {
                throw "Signing certificate was not found after importing it into $StoreName."
              }
              Write-Host "Trusted signing certificate in LocalMachine\\$StoreName."
            }
            finally {
              $Store.Close()
              $Store.Dispose()
            }
          }
          $Signature = Get-AuthenticodeSignature $MainExecutable
          if ($Signature.Status -ne "Valid") {
            throw "Invalid Authenticode signature for KhmerVideoDubber.exe: $($Signature.Status)"
          }


      - name: Frozen clean-machine native smoke test
        shell: pwsh
        run: |
          dist/KhmerVideoDubber/KhmerVideoDubber.exe --smoke-test

      - name: Build installer
        shell: pwsh
        run: |
          ISCC.exe "/DMyAppVersion=${{ inputs.version }}" packaging/windows/KhmerVideoDubber.iss

      - name: Sign and verify installer
        shell: pwsh
        run: |
          $Pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          $Signtool = (Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Filter signtool.exe -Recurse | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          $Installer = "packaging\windows\release\KhmerVideoDubber-Setup-${{ inputs.version }}.exe"
          packaging/windows/sign-file.ps1 `
            -Signtool $Signtool -Pfx $Pfx -Password $env:SIGNING_PASSWORD `
            -FilePath $Installer -TimestampUrl "http://timestamp.digicert.com" `
            -TimeoutSeconds 120
          $Signature = Get-AuthenticodeSignature $Installer
          if ($Signature.Status -ne "Valid") { throw "Installer signature verification failed: $($Signature.Status)" }
          Copy-Item (Join-Path $env:RUNNER_TEMP "publisher.cer") "packaging\windows\release\KhmerVideoDubber-Publisher.cer" -Force

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: KhmerVideoDubber-Setup-${{ inputs.version }}
          path: |
            packaging/windows/release/KhmerVideoDubber-Setup-${{ inputs.version }}.exe
            packaging/windows/release/KhmerVideoDubber-Publisher.cer
          if-no-files-found: error

      - name: Remove temporary signing trust
        if: ${{ always() }}
        shell: pwsh
        run: |
          if ($env:SIGNING_THUMBPRINT) {
            Remove-Item "Cert:\LocalMachine\Root\$env:SIGNING_THUMBPRINT" -Force -ErrorAction SilentlyContinue
            Remove-Item "Cert:\LocalMachine\TrustedPublisher\$env:SIGNING_THUMBPRINT" -Force -ErrorAction SilentlyContinue
          }
          Remove-Item (Join-Path $env:RUNNER_TEMP "codesign.pfx") -Force -ErrorAction SilentlyContinue
          Remove-Item (Join-Path $env:RUNNER_TEMP "publisher.cer") -Force -ErrorAction SilentlyContinue
